# GitHub Pages 演示部署：静态前端 + Vercel CORS 代理
# 前端：https://sz-hacker.github.io/luxiaoban/
# 代理：https://luxiaoban-proxy.vercel.app
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PROXY_BASE: https://luxiaoban-proxy.vercel.app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: vue/package-lock.json

      - name: Install frontend dependencies
        run: npm install --prefix vue

      - name: Build for GitHub Pages
        run: npm run build:edgeone --prefix vue
        env:
          VITE_BASE: /luxiaoban/
          VITE_API_BASE: ${{ env.PROXY_BASE }}/hb/api/v1
          VITE_UPLOAD_PROXY: ${{ env.PROXY_BASE }}/hb-cloud/api/v1
          VITE_PDF_PROXY_PREFIX: ${{ env.PROXY_BASE }}/pdf-proxy

      - name: Setup SPA fallback for client routing
        run: |
          cp vue/dist/index.html vue/dist/404.html
          touch vue/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: vue/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
