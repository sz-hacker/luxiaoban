# 部署大文件上传代理到 Cloudflare Workers（规避 Vercel 4.5MB 限制）
# 部署后地址示例：https://luxiaoban-upload.<你的子域>.workers.dev
name: Deploy Upload Proxy

on:
  push:
    branches:
      - main
    paths:
      - 'proxy-cloudflare/**'
      - '.github/workflows/deploy-upload-proxy.yml'
  workflow_dispatch:

jobs:
  deploy-upload-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: proxy-cloudflare
          command: deploy
