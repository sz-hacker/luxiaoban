# 部署 CORS 反向代理到 Cloudflare Workers（供 GitHub Pages 前端调用）
# 部署后地址示例：https://luxiaoban-proxy.<子域>.workers.dev
name: Deploy CORS Proxy

on:
  push:
    branches:
      - main
    paths:
      - 'proxy-cloudflare/**'
      - '.github/workflows/deploy-proxy.yml'
  workflow_dispatch:

jobs:
  deploy-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::未配置 GitHub Secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::未配置 GitHub Secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: proxy-cloudflare/package.json

      - name: Install Wrangler CLI
        run: npm install
        working-directory: proxy-cloudflare

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        working-directory: proxy-cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
