# 部署 CORS 反向代理到 Cloudflare Workers（供 GitHub Pages 前端调用）
# 部署后地址示例：https://luxiaoban-proxy.<子域>.workers.dev
name: Deploy CORS Proxy

on:
  push:
    branches:
      - main
    paths:
      - 'proxy-cloudflare/**'
      - '.github/workflows/deploy-proxy.yml'
  workflow_dispatch:

jobs:
  deploy-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: proxy-cloudflare
          command: deploy
